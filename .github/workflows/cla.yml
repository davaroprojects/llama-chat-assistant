name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
      NODE_OPTIONS: '--no-deprecation'
    steps:
      - name: CLA Assistant Lite
        if: >-
          (github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/davaroprojects/llama-chat-assistant/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'davaro,dependabot[bot],github-actions[bot],bot*'
          custom-notsigned-prcomment: 'Thanks for your contribution. Please review and sign our CLA: $pathToCLADocument'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
          lock-pullrequest-aftermerge: false