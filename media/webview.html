<!DOCTYPE html>
<html lang="{{htmlLang}}">

<head>
    <meta charset="UTF-8">
    {{cspMetaPlaceholder}}
    {{stylePlaceholder}}
</head>

<body data-empty-chat-ready-label="{{emptyChatReadyLabel}}" data-empty-server-stopped-label="{{emptyServerStoppedLabel}}" data-delete-session-label="{{deleteSessionLabel}}" data-session-unavailable-label="{{sessionUnavailableLabel}}" data-generation-canceled-label="{{generationCanceledLabel}}" data-remove-file-title="{{removeFileTitle}}" data-unavailable-short-label="{{unavailableShortLabel}}" data-copy-code-title="{{copyCodeTitle}}" data-copy-clipboard-title="{{copyClipboardTitle}}" data-new-session-label="{{newSessionLabel}}">
    <div class="tab-bar" role="tablist" aria-label="Sections">
        <button id="chat-tab-btn" class="tab-button is-active" type="button" role="tab" aria-selected="true">{{chatTabLabel}}</button>
        <button id="server-tab-btn" class="tab-button" type="button" role="tab" aria-selected="false">{{serverTabLabel}}</button>
    </div>

    <div id="chat-tab-panel" class="tab-panel">
        <div id="active-session-header" class="active-session-nav" style="display: none;">
            <div id="back-to-sessions-btn" class="back-icon-button" title="{{backToSessionsTitle}}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </div>
            <div id="active-session-title" class="active-session-title-text"></div>
        </div>

        <div id="sessions-container" style="display: none;">
            <div id="sessions-main-title" class="sessions-header">{{sessionsMainTitle}}</div>
            <div id="sessions-list"></div>
        </div>

        <div id="chat"></div>

        <div class="input-container">
            <div id="attached-files-container" class="attached-files-container">
            </div>

            <textarea id="prompt" rows="2" placeholder="{{promptPlaceholder}}"></textarea>
            <div class="input-actions">
                <div id="attach-file-btn" class="add-icon-button" title="{{attachFileTitle}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5v14" />
                    </svg>
                </div>
                <div class="chat-action-buttons">
                    <button id="send" title="{{sendMessageTitle}}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="m5 12 7-7 7 7M12 5v14" />
                        </svg>
                    </button>
                    <button id="stop" title="{{stopGenerationTitle}}" style="display: none;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://w3.org">
                            <rect x="4" y="4" width="16" height="16" rx="2" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="token-counter" class="token-counter">
            <div class="token-counter-left">
                <button id="model-menu-trigger" class="model-menu-trigger" type="button" title="{{modelMenuTitle}}">{{modelLabel}}</button>
            </div>
            <div class="token-counter-right">
                <div id="token-usage-container" class="token-usage-container" role="button" aria-label="Token usage" tabindex="0">
                    <div id="token-usage-chart" class="token-usage-chart" title="Click for details">
                    </div>
                    <div id="token-usage-percentage" class="token-usage-percentage">0%</div>
                </div>
            </div>
        </div>
    </div>

    <div id="context-window" class="quick-context-window" style="display:none;">
        <div id="context-window-content" class="quick-context-window-content"></div>
    </div>

    <div id="server-tab-panel" class="tab-panel server-tab-panel" style="display:none;">
        <div class="server-panel-card">
            <button id="server-start-btn" class="server-start-button" type="button" title="{{serverStartLabel}}" data-label="{{serverStartLabel}}" data-loading-label="{{serverStartLabel}}">
                <span class="server-action-button-label">{{serverStartLabel}}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </button>
            <button id="server-stop-btn" class="server-stop-button" type="button" title="{{serverStopLabel}}" style="display:none;" data-label="{{serverStopLabel}}" data-loading-label="{{serverStopLabel}}">
                <span class="server-action-button-label">{{serverStopLabel}}</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://w3.org">
                    <rect x="4" y="4" width="16" height="16" rx="2" />
                </svg>
            </button>
        </div>
        <div class="server-parameters-panel">
            <div class="server-parameters-title">{{serverParametersTitle}}</div>
            <table class="server-parameters-table">
                <thead>
                    <tr>
                        <th>{{propertyLabel}}</th>
                        <th>{{valueLabel}}</th>
                    </tr>
                </thead>
                <tbody id="server-parameters-body"></tbody>
            </table>
        </div>
    </div>

    {{scriptPlaceholder}}
</body>

</html>
