<!DOCTYPE html>
<html lang="{{htmlLang}}">

<head>
    <meta charset="UTF-8">
    {{cspMetaPlaceholder}}
    {{stylePlaceholder}}
</head>

<body data-empty-chat-ready-label="{{emptyChatReadyLabel}}" data-empty-server-stopped-label="{{emptyServerStoppedLabel}}" data-delete-session-label="{{deleteSessionLabel}}" data-session-unavailable-label="{{sessionUnavailableLabel}}" data-generation-canceled-label="{{generationCanceledLabel}}" data-remove-file-title="{{removeFileTitle}}" data-unavailable-short-label="{{unavailableShortLabel}}" data-copy-code-title="{{copyCodeTitle}}" data-copy-clipboard-title="{{copyClipboardTitle}}" data-new-session-label="{{newSessionLabel}}" data-external-server-blocked-label="{{externalServerBlockedLabel}}" data-repository-badge-label="{{repositoryBadgeLabel}}" data-rag-idle-label="{{ragIdleLabel}}" data-rag-indexing-label="{{ragIndexingLabel}}" data-rag-indexed-label="{{ragIndexedLabel}}" data-rag-never-indexed-label="{{ragNeverIndexedLabel}}" data-rag-chroma-unavailable-label="{{ragChromaUnavailableLabel}}" data-about-markdown="{{aboutMarkdown}}">
    <div class="main-content">
        <div id="chat-tab-panel" class="tab-panel">
        <div id="active-session-header" class="active-session-nav" style="display: none;">
            <div id="back-to-sessions-btn" class="back-icon-button" title="{{backToSessionsTitle}}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </div>
            <div id="active-session-title" class="active-session-title-text"></div>
        </div>

        <div id="sessions-container" style="display: none;">
            <div id="sessions-main-title" class="sessions-header">{{sessionsMainTitle}}</div>
            <div id="sessions-list"></div>
        </div>

        <div id="chat"></div>

        <div class="input-container">
            <div id="attached-files-container" class="attached-files-container">
            </div>

            <textarea id="prompt" rows="2" placeholder="{{promptPlaceholder}}"></textarea>
            <div class="input-actions">
                <div class="input-left-controls">
                    <div id="attach-file-btn" class="add-icon-button" title="{{attachFileTitle}}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5v14" />
                        </svg>
                    </div>
                        <div id="rag-context-control" class="rag-context-control">
                            <label id="rag-switch-label" class="rag-switch-label" for="rag-enabled">
                                <span class="rag-switch-text">rag</span>
                                <input type="checkbox" id="rag-enabled" name="ragEnabled" />
                                <span class="rag-switch-track" aria-hidden="true"></span>
                            </label>
                            <button id="rag-no-data-btn" class="action-icon-btn rag-no-data-btn" type="button" style="display:none;">no data</button>
                        </div>
                </div>
                <div class="chat-action-buttons">
                    <button id="send" title="{{sendMessageTitle}}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="m5 12 7-7 7 7M12 5v14" />
                        </svg>
                    </button>
                    <button id="stop" title="{{stopGenerationTitle}}" style="display: none;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://w3.org">
                            <rect x="4" y="4" width="16" height="16" rx="2" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        </div>

        <div id="about-tab-panel" class="tab-panel about-tab-panel" style="display:none;">
            <div id="about-markdown-content" class="about-markdown-content"></div>
        </div>

    <div id="context-window" class="quick-context-window" style="display:none;">
        <div id="context-window-content" class="quick-context-window-content"></div>
    </div>

        <div id="settings-tab-panel" class="tab-panel settings-tab-panel" style="display:none;">
            <div class="settings-components">
            <div class="action-panel">
                <div class="action-header">
                    <span class="action-header-title">Llama.cpp</span>
                    <span id="llama-status-badge" class="llama-status-badge is-stopped">stopped</span>
                </div>
                <div class="action-content">
                    <span id="server-action-text" class="action-text">Not running</span><span id="server-action-loader" class="action-loader" style="display:none;"></span>
                </div>
                <div class="action-buttons">
                    <div class="action-buttons-left">
                        <button id="server-action-copy-icon" class="action-icon-btn" type="button" title="Copy text">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="action-buttons-right">
                        <button id="server-action-start-icon" class="action-icon-btn" type="button" title="Start" style="display:none;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <polygon points="5 3 19 12 5 21"></polygon>
                            </svg>
                        </button>
                        <button id="server-action-stop-icon" class="action-icon-btn" type="button" title="Stop" style="display:none;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="action-panel">
                <div class="action-header">
                    <span class="action-header-title">ChromaDB</span>
                </div>
                <div class="action-content">
                    <span id="rag-action-text" class="action-text">The project has not been indexed</span><span id="rag-action-loader" class="action-loader" style="display:none;"></span>
                </div>
                <div class="action-buttons">
                    <div class="action-buttons-left">
                        <button id="rag-action-copy-icon" class="action-icon-btn" type="button" title="Copy text">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect>
                                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="action-buttons-right">
                        <button id="rag-action-refresh-icon" class="action-icon-btn" type="button" title="Index">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
            </div>
        </div>
    </div>

    <div id="bottom-panel" class="bottom-panel">
        <div class="bottom-panel-left" aria-label="Primary navigation" role="toolbar">
            <div id="messages-icon-trigger" class="footer-icon-button" role="button" aria-label="Chat" tabindex="0" title="Chat">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <span class="footer-control-separator" aria-hidden="true">|</span>
            <div id="settings-icon-trigger" class="footer-icon-button" role="button" aria-label="Settings" tabindex="0" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </div>
            <span class="footer-control-separator" aria-hidden="true">|</span>
            <div id="about-icon-trigger" class="footer-icon-button" role="button" aria-label="Information" tabindex="0" title="Information">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </div>
        </div>
        <div id="token-counter" class="token-counter">
            <div class="token-counter-right">
                <div id="model-menu-trigger" class="footer-icon-button" role="button" aria-label="Model" tabindex="0" title="Click for model details">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="4" width="18" height="12" rx="2"></rect>
                        <line x1="8" y1="20" x2="16" y2="20"></line>
                        <line x1="12" y1="16" x2="12" y2="20"></line>
                    </svg>
                </div>
                <span class="footer-control-separator" aria-hidden="true">|</span>
                <div id="token-usage-container" class="token-usage-container" role="button" aria-label="Token usage" tabindex="0">
                    <div id="token-usage-chart" class="token-usage-chart" title="Click for details">
                    </div>
                    <div id="token-usage-percentage" class="token-usage-percentage">0%</div>
                </div>
            </div>
        </div>
    </div>

    {{scriptPlaceholder}}
</body>

</html>
