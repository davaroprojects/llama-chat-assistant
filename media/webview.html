<!DOCTYPE html>
<html lang="{{htmlLang}}">

<head>
    <meta charset="UTF-8">
    {{cspMetaPlaceholder}}
    {{stylePlaceholder}}
</head>

<body data-empty-chat-ready-label="{{emptyChatReadyLabel}}" data-empty-server-stopped-label="{{emptyServerStoppedLabel}}" data-delete-session-label="{{deleteSessionLabel}}" data-session-unavailable-label="{{sessionUnavailableLabel}}" data-generation-canceled-label="{{generationCanceledLabel}}" data-remove-file-title="{{removeFileTitle}}" data-unavailable-short-label="{{unavailableShortLabel}}" data-copy-code-title="{{copyCodeTitle}}" data-copy-clipboard-title="{{copyClipboardTitle}}" data-new-session-label="{{newSessionLabel}}" data-external-server-blocked-label="{{externalServerBlockedLabel}}" data-repository-badge-label="{{repositoryBadgeLabel}}" data-rag-idle-label="{{ragIdleLabel}}" data-rag-indexing-label="{{ragIndexingLabel}}" data-rag-indexed-label="{{ragIndexedLabel}}" data-rag-never-indexed-label="{{ragNeverIndexedLabel}}" data-rag-chroma-unavailable-label="{{ragChromaUnavailableLabel}}" data-rag-switch-text="{{ragSwitchText}}" data-rag-no-data-button-label="{{ragNoDataButtonLabel}}" data-llama-panel-title="{{llamaPanelTitle}}" data-embeddings-panel-title="{{embeddingsPanelTitle}}" data-chroma-panel-title="{{chromaPanelTitle}}" data-panel-state-not-running="{{panelStateNotRunning}}" data-panel-button-start="{{panelButtonStart}}" data-panel-button-stop="{{panelButtonStop}}" data-panel-button-starting="{{panelButtonStarting}}" data-panel-button-index="{{panelButtonIndex}}" data-panel-button-copy-text="{{panelButtonCopyText}}" data-status-running-label="{{statusRunningLabel}}" data-status-stopped-label="{{statusStoppedLabel}}" data-status-started-label="{{statusStartedLabel}}" data-model-menu-aria-label="{{modelMenuAriaLabel}}" data-model-menu-title="{{modelMenuTitle}}" data-token-usage-aria-label="{{tokenUsageAriaLabel}}" data-token-usage-title="{{tokenUsageTitle}}" data-tab-chat-aria-label="{{tabChatAriaLabel}}" data-tab-settings-aria-label="{{tabSettingsAriaLabel}}" data-tab-about-aria-label="{{tabAboutAriaLabel}}" data-tab-chat-title="{{tabChatTitle}}" data-tab-settings-title="{{tabSettingsTitle}}" data-tab-about-title="{{tabAboutTitle}}" data-about-markdown="{{aboutMarkdown}}">
    <div class="main-content">
        <div id="chat-tab-panel" class="tab-panel">
        <div id="active-session-header" class="active-session-nav" style="display: none;">
            <div id="back-to-sessions-btn" class="back-icon-button" title="{{backToSessionsTitle}}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </div>
            <div id="active-session-title" class="active-session-title-text"></div>
        </div>

        <div id="sessions-container" style="display: none;">
            <div id="sessions-main-title" class="sessions-header">{{sessionsMainTitle}}</div>
            <div id="sessions-list"></div>
        </div>

        <div id="chat"></div>

        <div class="input-container">
            <div id="attached-files-container" class="attached-files-container">
            </div>

            <textarea id="prompt" rows="2" placeholder="{{promptPlaceholder}}"></textarea>
            <div class="input-actions">
                <div class="input-left-controls">
                    <div id="attach-file-btn" class="add-icon-button" title="{{attachFileTitle}}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5v14" />
                        </svg>
                    </div>
                        <div id="rag-context-control" class="rag-context-control">
                            <label id="rag-switch-label" class="rag-switch-label" for="rag-enabled">
                                <span class="rag-switch-text">{{ragSwitchText}}</span>
                                <input type="checkbox" id="rag-enabled" name="ragEnabled" />
                                <span class="rag-switch-track" aria-hidden="true"></span>
                            </label>
                            <button id="rag-no-data-btn" class="action-icon-btn rag-no-data-btn" type="button" style="display:none;">{{ragNoDataButtonLabel}}</button>
                        </div>
                </div>
                <div class="chat-action-buttons">
                    <button id="send" title="{{sendMessageTitle}}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="m5 12 7-7 7 7M12 5v14" />
                        </svg>
                    </button>
                    <button id="stop" title="{{stopGenerationTitle}}" style="display: none;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" xmlns="http://w3.org">
                            <rect x="4" y="4" width="16" height="16" rx="2" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        </div>

    <div id="context-window" class="quick-context-window" style="display:none;">
        <div id="context-window-content" class="quick-context-window-content"></div>
    </div>

        <div id="settings-tab-panel" class="tab-panel settings-tab-panel" style="display:none;">
            <div class="settings-components">

            <!-- Server tree component -->
            <div class="server-tree" id="server-tree">
                <div class="tree-root-row" id="tree-root-row">
                    <button class="tree-chevron-btn" id="tree-llama-chevron" aria-expanded="true">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <polygon points="6 9 12 15 18 9"></polygon>
                        </svg>
                    </button>
                    <svg class="tree-node-icon tree-root-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="4" width="18" height="12" rx="2"></rect>
                        <line x1="8" y1="20" x2="16" y2="20"></line>
                        <line x1="12" y1="16" x2="12" y2="20"></line>
                    </svg>
                    <span class="tree-node-label tree-root-label">llama.cpp</span>
                </div>
                <div class="tree-children" id="tree-llama-children">
                    <div class="tree-leaf-row" id="tree-node-chat" tabindex="0" role="button" data-server="chat">
                        <span class="tree-leaf-indent"></span>
                        <span class="tree-status-icon" id="tree-status-chat"></span>
                        <span class="tree-node-label">chat</span>
                    </div>
                    <div class="tree-leaf-row" id="tree-node-embeddings" tabindex="0" role="button" data-server="embeddings">
                        <span class="tree-leaf-indent"></span>
                        <span class="tree-status-icon" id="tree-status-embeddings"></span>
                        <span class="tree-node-label">embeddings</span>
                    </div>
                </div>

                <!-- ChromaDB tree component -->
                <div class="tree-root-row" id="tree-chromadb-root" style="border-top: 1px solid var(--vscode-panel-border); margin-top: 0; padding-top: 8px;">
                    <button class="tree-chevron-btn" id="tree-chromadb-chevron" aria-expanded="true">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <polygon points="6 9 12 15 18 9"></polygon>
                        </svg>
                    </button>
                    <svg class="tree-node-icon tree-root-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="4" width="18" height="12" rx="2"></rect>
                        <line x1="8" y1="20" x2="16" y2="20"></line>
                        <line x1="12" y1="16" x2="12" y2="20"></line>
                    </svg>
                    <span class="tree-node-label tree-root-label">chromadb</span>
                </div>
                <div class="tree-children" id="tree-chromadb-children">
                    <div class="tree-leaf-row" id="tree-node-chromadb-status" tabindex="0" role="button">
                        <span class="tree-leaf-indent"></span>
                        <span class="tree-status-icon" id="tree-status-chromadb"></span>
                        <span class="tree-node-label" id="tree-chromadb-label">not indexed</span>
                    </div>
                </div>
            </div>

            <!-- Context menu for tree nodes -->
            <div id="node-ctx-menu" class="server-node-ctx-menu" style="display:none;" role="menu">
                <button id="ctx-menu-action-btn" class="ctx-menu-item" role="menuitem" style="display:none;"></button>
                <button id="ctx-menu-index-btn" class="ctx-menu-item" role="menuitem" style="display:none;">{{panelButtonIndex}}</button>
                <button id="ctx-menu-clear-btn" class="ctx-menu-item" role="menuitem" style="display:none;">Clear</button>
                <button id="ctx-menu-stop-btn" class="ctx-menu-item" role="menuitem" style="display:none;">Stop</button>
                <div class="ctx-menu-separator" role="separator"></div>
                <button id="ctx-menu-cancel-btn" class="ctx-menu-item" role="menuitem">{{panelCtxCancel}}</button>
            </div>
        </div>
            </div>
        </div>
    </div>

    <div id="bottom-panel" class="bottom-panel">
        <div class="bottom-panel-left" aria-label="Primary navigation" role="toolbar">
            <div id="messages-icon-trigger" class="footer-icon-button" role="button" aria-label="{{tabChatAriaLabel}}" tabindex="0" title="{{tabChatTitle}}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <span class="footer-control-separator" aria-hidden="true">|</span>
            <div id="settings-icon-trigger" class="footer-icon-button" role="button" aria-label="{{tabSettingsAriaLabel}}" tabindex="0" title="{{tabSettingsTitle}}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </div>
        </div>
        <div id="token-counter" class="token-counter">
            <div class="token-counter-right">
                <div id="model-menu-trigger" class="footer-icon-button" role="button" aria-label="{{modelMenuAriaLabel}}" tabindex="0" title="{{modelMenuTitle}}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="4" width="18" height="12" rx="2"></rect>
                        <line x1="8" y1="20" x2="16" y2="20"></line>
                        <line x1="12" y1="16" x2="12" y2="20"></line>
                    </svg>
                </div>
                <span class="footer-control-separator" aria-hidden="true">|</span>
                <div id="token-usage-container" class="token-usage-container" role="button" aria-label="{{tokenUsageAriaLabel}}" tabindex="0">
                    <div id="token-usage-chart" class="token-usage-chart" title="{{tokenUsageTitle}}">
                    </div>
                    <div id="token-usage-percentage" class="token-usage-percentage">0%</div>
                </div>
            </div>
        </div>
    </div>

    {{scriptPlaceholder}}
</body>

</html>
